name: game_dart
description: "Eğlenceli bir dart tahta oyunu - A fun dart board game."
publish_to: 'none'
version: 1.0.1+2

# ─────────────────────────────────────────────────────────────────
# KURUMSAL AĞ / GÜVENLIK DUVARI NOTU:
# Bağımlılıkları çekerken sorun yaşarsanız PowerShell'de çalıştırın:
#   $env:PUB_HOSTED_URL="https://pub.flutter-io.cn"
#   $env:FLUTTER_STORAGE_BASE_URL="https://storage.flutter-io.cn"
# Veya şirket proxy'si için:
#   flutter --proxy=http://proxy.sirket.com:PORT pub get
# ─────────────────────────────────────────────────────────────────

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # AdMob (web platformunda otomatik devre dışı)
  google_mobile_ads: ^5.1.0

  # Localization
  easy_localization: ^3.0.7

  # Persistence
  shared_preferences: ^2.2.3

  # App Info
  package_info_plus: ^6.0.0

  # Sharing
  share_plus: ^9.0.0

  # Audio
  audioplayers: ^6.0.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/images/
    - assets/audio/
